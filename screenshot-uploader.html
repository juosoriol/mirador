<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📸 Subir Screenshots - Mirador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #1f2937;
    }
    p {
      color: #6b7280;
      margin-bottom: 30px;
    }
    .drop-zone {
      border: 3px dashed #cbd5e1;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      background: #f8fafc;
      cursor: pointer;
      transition: all 0.3s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #667eea;
      background: #eef2ff;
    }
    .drop-zone-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .drop-zone-text {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }
    .drop-zone-hint {
      font-size: 14px;
      color: #6b7280;
    }
    #file-input {
      display: none;
    }
    .preview {
      margin-top: 30px;
    }
    .preview-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .preview-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #e5e7eb;
    }
    .preview-info {
      flex: 1;
    }
    .preview-name {
      font-weight: 600;
      color: #1f2937;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .preview-status {
      font-size: 12px;
      color: #10b981;
      font-weight: 500;
    }
    .btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 Subir Screenshots</h1>
    <p>Arrastra tus capturas de pantalla del iPhone aquí o haz clic para seleccionar</p>

    <div class="drop-zone" id="drop-zone">
      <div class="drop-zone-icon">📱</div>
      <div class="drop-zone-text">Arrastra imágenes aquí</div>
      <div class="drop-zone-hint">o haz clic para seleccionar archivos</div>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple>

    <div class="preview" id="preview"></div>

    <button class="btn" id="save-btn" style="display:none">💾 Guardar todas las capturas</button>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const saveBtn = document.getElementById('save-btn');
    let files = [];

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(newFiles) {
      files = [...files, ...Array.from(newFiles)];
      renderPreview();
      saveBtn.style.display = 'block';
    }

    function renderPreview() {
      preview.innerHTML = '';
      files.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const div = document.createElement('div');
          div.className = 'preview-item';
          div.innerHTML = `
            <img src="${e.target.result}" alt="${file.name}">
            <div class="preview-info">
              <div class="preview-name">${file.name}</div>
              <div class="preview-status">✓ Lista para guardar</div>
            </div>
          `;
          preview.appendChild(div);
        };
        reader.readAsDataURL(file);
      });
    }

    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true;
      saveBtn.textContent = '⏳ Guardando...';

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const reader = new FileReader();

        await new Promise((resolve) => {
          reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const timestamp = Date.now();
            const fileName = `screenshot-${timestamp}-${i}.png`;

            // Guardar en localStorage para que Claude lo lea
            const screenshots = JSON.parse(localStorage.getItem('mirador-screenshots') || '[]');
            screenshots.push({
              name: fileName,
              data: e.target.result,
              timestamp: timestamp
            });
            localStorage.setItem('mirador-screenshots', JSON.stringify(screenshots));

            resolve();
          };
          reader.readAsDataURL(file);
        });
      }

      saveBtn.textContent = '✅ Capturas guardadas';
      setTimeout(() => {
        alert(`✅ ${files.length} captura(s) guardada(s) correctamente.\n\nClaude puede verlas ahora. Cierra esta ventana y avísale.`);
      }, 500);
    });
  </script>
</body>
</html>
