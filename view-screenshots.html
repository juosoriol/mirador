<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver Screenshots - Mirador</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .count {
      color: #94a3b8;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .screenshot {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      border: 2px solid #334155;
    }
    .screenshot img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #475569;
    }
    .screenshot-name {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }
    .screenshot-time {
      font-size: 12px;
      color: #64748b;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 Screenshots de Mirador</h1>
    <div class="count" id="count">Cargando...</div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const count = document.getElementById('count');

    const screenshots = JSON.parse(localStorage.getItem('mirador-screenshots') || '[]');

    if (screenshots.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <p>No hay capturas guardadas aún.<br>Usa screenshot-uploader.html para subir capturas.</p>
        </div>
      `;
      count.textContent = 'No hay capturas';
    } else {
      count.textContent = `${screenshots.length} captura(s) guardada(s)`;
      screenshots.reverse().forEach(screenshot => {
        const div = document.createElement('div');
        div.className = 'screenshot';
        const date = new Date(screenshot.timestamp);
        div.innerHTML = `
          <img src="${screenshot.data}" alt="${screenshot.name}">
          <div class="screenshot-name">${screenshot.name}</div>
          <div class="screenshot-time">${date.toLocaleString('es-ES')}</div>
        `;
        grid.appendChild(div);
      });
    }
  </script>
</body>
</html>
